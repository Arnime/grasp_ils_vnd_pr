name: Bug report
description: Report a problem with givp
labels: [ "bug", "needs-triage" ]
body:
  - type: input
    id: version
    attributes:
      label: givp version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.4"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / Ubuntu 22.04 / macOS 14"
    validations:
      required: true
  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: A small, runnable Python snippet that triggers the bug.
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include traceback if any.
    validations:
      required: true
