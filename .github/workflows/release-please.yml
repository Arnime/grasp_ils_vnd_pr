name: Auto Tag on Version Bump

# Cria automaticamente uma tag vX.Y.Z sempre que a versão em
# pyproject.toml mudar na branch main, disparando assim o workflow
# Release (release.yml) que publica no PyPI.

on:
    push:
        branches: [main]
        paths:
            - pyproject.toml

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions: read-all

jobs:
    auto-tag:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  fetch-depth: 0

            - name: Read version from pyproject.toml
              id: version
              run: |
                  VERSION=$(python3 -c "
                  import tomllib, pathlib
                  data = tomllib.load(pathlib.Path('pyproject.toml').open('rb'))
                  print(data['project']['version'])
                  ")
                  echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
                  echo "Detected version: v${VERSION}"

            - name: Check if tag already exists
              id: tag_check
              run: |
                  if git ls-remote --tags origin "${{ steps.version.outputs.tag }}" | grep -q .; then
                      echo "exists=true" >> "$GITHUB_OUTPUT"
                      echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping."
                  else
                      echo "exists=false" >> "$GITHUB_OUTPUT"
                      echo "Tag ${{ steps.version.outputs.tag }} does not exist — will create."
                  fi

            - name: Create and push tag
              if: steps.tag_check.outputs.exists == 'false'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag "${{ steps.version.outputs.tag }}"
                  git push origin "${{ steps.version.outputs.tag }}"
                  echo "Tag ${{ steps.version.outputs.tag }} created and pushed."

                      sbom.cdx.json
                      dist/*
            - name: Move sigstore files out of dist
              run: mv dist/*.sigstore.json .
            - name: Publish to PyPI (trusted publisher)
              uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
              with:
                  skip-existing: true
                  packages-dir: dist
