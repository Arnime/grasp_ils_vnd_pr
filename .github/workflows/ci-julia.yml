name: CI Julia

on:
  push:
    branches: [ main ]
    paths:
      - "julia/**"
      - "!julia/**/*.md"
      - "!julia/LICENSE"
      - ".github/workflows/ci-julia.yml"
      - "codecov.yml"
  pull_request:
    paths:
      - "julia/**"
      - "!julia/**/*.md"
      - "!julia/LICENSE"
      - ".github/workflows/ci-julia.yml"
      - "codecov.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions: read-all

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      versions: ${{ steps.pick.outputs.versions }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: pick
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            if git diff --name-only "$PR_BASE" HEAD -- julia/src julia/test | grep -q .; then
              echo 'versions=["1.9","1.10","1.11","1.12"]' >> "$GITHUB_OUTPUT"
            else
              echo 'versions=["1"]' >> "$GITHUB_OUTPUT"
            fi
          else
            echo 'versions=["1.9","1.10","1.11","1.12"]' >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: setup
    runs-on: ${{ matrix.os }}
    permissions:
      actions: write # required by julia-actions/cache delete-old-caches
      checks: read
      contents: read
      deployments: read
      issues: read
      packages: read
      pull-requests: read
      repository-projects: read
      security-events: read
      statuses: read
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        julia-version: ${{ fromJson(needs.setup.outputs.versions) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: julia-actions/setup-julia@f6f565d9f7cf12f53dc8045742460d6260ad3b39 # v3.0.1
        with:
          version: ${{ matrix.julia-version }}

      - uses: julia-actions/cache@9a93c5fb3e9c1c20b60fc80a478cae53e38618a4 # v3.0.2

      - name: Install dependencies
        run: |
          julia --project=julia -e '
            using Pkg
            Pkg.Registry.update()
            rm(joinpath("julia", "Manifest.toml"); force=true)
            Pkg.instantiate()
          '

      - name: Run tests
        run: julia --project=julia -e 'using Pkg; Pkg.test()'

  coverage:
    runs-on: ubuntu-latest
    permissions:
      actions: write # required by julia-actions/cache delete-old-caches
      checks: read
      contents: read
      deployments: read
      issues: read
      packages: read
      pull-requests: read
      repository-projects: read
      security-events: read
      statuses: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: julia-actions/setup-julia@f6f565d9f7cf12f53dc8045742460d6260ad3b39 # v3.0.1
        with:
          version: "1"

      - uses: julia-actions/cache@9a93c5fb3e9c1c20b60fc80a478cae53e38618a4 # v3.0.2

      - name: Install dependencies
        run: |
          julia --project=julia -e '
            using Pkg
            Pkg.Registry.update()
            rm(joinpath("julia", "Manifest.toml"); force=true)
            Pkg.instantiate()
          '

      - name: Run tests with coverage
        run: julia --project=julia -e 'using Pkg; Pkg.test(; coverage=true)'

      - name: Process coverage
        run: |
          julia -e '
            using Pkg
            Pkg.add("CoverageTools")
            using CoverageTools
            coverage = process_folder("julia/src")
            LCOV.writefile("julia-lcov.info", coverage)
          '

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          files: julia-lcov.info
          flags: julia
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
