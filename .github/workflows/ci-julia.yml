name: CI Julia

on:
  push:
    branches: [ main ]
    paths:
      - 'julia/**'
      - '.github/workflows/ci-julia.yml'
  pull_request:
    paths:
      - 'julia/**'
      - '.github/workflows/ci-julia.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions: read-all

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        julia-version: [ "1.9", "1.10", "1.11", "1.12" ]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: julia-actions/setup-julia@5c9647d97b78a5debe5164e9eec09d653d29a6f8 # v2
        with:
          version: ${{ matrix.julia-version }}

      - uses: julia-actions/cache@824243901fb567f4ece9bed855b7bff5c26fdfb8 # v2

      - name: Install dependencies
        run: julia --project=julia -e 'using Pkg; Pkg.instantiate()'

      - name: Run tests
        run: julia --project=julia -e 'using Pkg; Pkg.test()'

      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.julia-version == '1.12'
        run: julia --project=julia -e 'using Pkg; Pkg.test(; coverage=true)'

      - name: Process coverage
        if: matrix.os == 'ubuntu-latest' && matrix.julia-version == '1.12'
        run: |
          julia -e '
            using Pkg
            Pkg.add("CoverageTools")
            using CoverageTools
            coverage = process_folder("julia/src")
            LCOV.writefile("julia-lcov.info", coverage)
          '

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.julia-version == '1.12'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          files: julia-lcov.info
          flags: julia
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
