name: CI Julia

on:
  push:
    branches: [ main ]
    paths:
      - "julia/**"
      - "!julia/**/*.md"
      - "!julia/LICENSE"
      - ".github/workflows/ci-julia.yml"
      - "codecov.yml"
  pull_request:
    paths:
      - "julia/**"
      - "!julia/**/*.md"
      - "!julia/LICENSE"
      - ".github/workflows/ci-julia.yml"
      - "codecov.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions: read-all

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      versions: ${{ steps.pick.outputs.versions }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: pick
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            if git diff --name-only "$PR_BASE" HEAD -- julia/src julia/test | grep -q .; then
              echo 'versions=["1.9","1.10","1.11","1.12"]' >> "$GITHUB_OUTPUT"
            else
              echo 'versions=["1"]' >> "$GITHUB_OUTPUT"
            fi
          else
            echo 'versions=["1.9","1.10","1.11","1.12"]' >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: setup
    runs-on: ${{ matrix.os }}
    permissions:
      actions: write # required by julia-actions/cache delete-old-caches
      checks: read
      contents: read
      deployments: read
      issues: read
      packages: read
      pull-requests: read
      repository-projects: read
      security-events: read
      statuses: read
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        julia-version: ${{ fromJson(needs.setup.outputs.versions) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: julia-actions/setup-julia@f6f565d9f7cf12f53dc8045742460d6260ad3b39 # v3.0.1
        with:
          version: ${{ matrix.julia-version }}

      - uses: julia-actions/cache@9a93c5fb3e9c1c20b60fc80a478cae53e38618a4 # v3.0.2

      - name: Install dependencies
        run: |
          julia --project=julia -e '
            using Pkg
            Pkg.Registry.update()
            rm(joinpath("julia", "Manifest.toml"); force=true)
            Pkg.instantiate()
          '

      - name: Run tests
        run: julia --project=julia -e 'using Pkg; Pkg.test()'

  coverage:
    runs-on: ubuntu-latest
    permissions:
      actions: write # required by julia-actions/cache delete-old-caches
      checks: read
      contents: read
      deployments: read
      issues: read
      packages: read
      pull-requests: read
      repository-projects: read
      security-events: read
      statuses: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: julia-actions/setup-julia@f6f565d9f7cf12f53dc8045742460d6260ad3b39 # v3.0.1
        with:
          version: "1"

      - uses: julia-actions/cache@9a93c5fb3e9c1c20b60fc80a478cae53e38618a4 # v3.0.2

      - name: Install dependencies
        run: |
          julia --project=julia -e '
            using Pkg
            Pkg.Registry.update()
            rm(joinpath("julia", "Manifest.toml"); force=true)
            Pkg.instantiate()
          '

      - name: Run tests with coverage
        run: julia --project=julia -e 'using Pkg; Pkg.test(; coverage=true)'

      - name: Process coverage
        run: |
          julia -e '
            using Pkg
            Pkg.add("CoverageTools")
            using CoverageTools
            coverage = process_folder("julia/src")
            LCOV.writefile("julia-lcov.info", coverage)
          '

      - name: Check coverage gate (≥95%)
        run: |
          julia -e '
            using Pkg; Pkg.add("CoverageTools")
            using CoverageTools
            cov = process_folder("julia/src")
            hit = 0; total = 0
            for s in cov, c in s.coverage
              c === nothing && continue
              total += 1
              c > 0 && (hit += 1)
            end
            pct = total > 0 ? hit / total * 100.0 : 0.0
            println("Julia coverage: $(round(pct; digits=1))%  ($hit / $total lines)")
            pct >= 95.0 || (println("::error::Coverage below 95% threshold (got $(round(pct; digits=1))%)"); exit(1))
          '

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          files: julia-lcov.info
          flags: julia
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  format:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: julia-actions/setup-julia@f6f565d9f7cf12f53dc8045742460d6260ad3b39 # v3.0.1
        with:
          version: "1"

      - uses: julia-actions/cache@9a93c5fb3e9c1c20b60fc80a478cae53e38618a4 # v3.0.2

      - name: Check formatting (JuliaFormatter)
        run: |
          julia -e '
            using Pkg; Pkg.add("JuliaFormatter")
            using JuliaFormatter
            formatted = format("julia/"; overwrite=false)
            if !formatted
              println("::error::Julia code is not formatted.")
              println("::error::Fix locally with: using JuliaFormatter; format(\"julia/\")")
              exit(1)
            end
          '

  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: julia-actions/setup-julia@f6f565d9f7cf12f53dc8045742460d6260ad3b39 # v3.0.1
        with:
          version: "1"

      - uses: julia-actions/cache@9a93c5fb3e9c1c20b60fc80a478cae53e38618a4 # v3.0.2

      - name: Install dependencies
        run: |
          julia --project=julia -e '
            using Pkg
            Pkg.Registry.update()
            rm(joinpath("julia", "Manifest.toml"); force=true)
            Pkg.instantiate()
          '

      - name: Run fuzz trials
        run: |
          julia --project=julia julia/fuzz/fuzz_givp.jl \
            --n-trials 500 \
            --seed 1337 \
            --timeout 600

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: julia-actions/setup-julia@f6f565d9f7cf12f53dc8045742460d6260ad3b39 # v3.0.1
        with:
          version: "1"

      - uses: julia-actions/cache@9a93c5fb3e9c1c20b60fc80a478cae53e38618a4 # v3.0.2

      - name: Install dependencies
        run: |
          julia --project=julia -e '
            using Pkg
            Pkg.Registry.update()
            rm(joinpath("julia", "Manifest.toml"); force=true)
            Pkg.instantiate()
          '

      - name: Run Aqua package quality checks
        run: |
          julia --project=julia -e '
            using Pkg
            Pkg.add(["Aqua"])
            using GIVPOptimizer, Aqua
            Aqua.test_all(
              GIVPOptimizer;
              ambiguities = (broken = false,),
              stale_deps = (ignore = [:JSON],),
            )
            println("Aqua: all checks passed ✓")
          '

      - name: Run JET static type analysis
        run: |
          julia --project=julia -e '
            using Pkg
            Pkg.add(["JET"])
            using GIVPOptimizer, JET
            result = JET.report_package("GIVPOptimizer"; ignored_modules=(Base, Core))
            reports = JET.get_reports(result)
            if !isempty(reports)
              for r in reports
                println("::error file=julia/src::JET: ", r)
              end
              exit(1)
            end
            println("JET: no type-inference errors ✓")
          '

  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: julia-actions/setup-julia@f6f565d9f7cf12f53dc8045742460d6260ad3b39 # v3.0.1
        with:
          version: "1"

      - name: Audit dependencies for known vulnerabilities
        run: |
          julia -e '
            using Pkg
            Pkg.activate("julia")
            Pkg.Registry.update()
            Pkg.instantiate()
            Pkg.audit()
            println("Pkg.audit: no vulnerabilities found ✓")
          '

      - name: Check for unsafe FFI calls in source
        run: |
          if grep -rn --include="*.jl" -E '\bccall\b|\b@ccall\b|\bunsafe_' julia/src/; then
            echo "::error::Unsafe FFI call (ccall/@ccall/unsafe_*) found in julia/src/."
            echo "::error::Review each occurrence and add an explicit justification comment."
            exit 1
          fi
          echo "No unsafe FFI calls found in julia/src/ ✓"

      - name: Generate SBOM (dependency manifest)
        run: |
          julia -e '
            using Pkg
            Pkg.activate("julia")
            deps = Pkg.dependencies()
            open("julia-sbom.txt", "w") do io
              println(io, "# GIVPOptimizer.jl — dependency manifest")
              println(io, "# Generated: ", string(Dates.now()))
              for (uuid, info) in sort(collect(deps); by = x -> x[2].name)
                println(io, info.name, " @ ", something(info.version, "stdlib"))
              end
            end
          ' || julia -e 'using Dates; open("julia-sbom.txt","w") do io; println(io,"Generated: ",Dates.now()); end'

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: julia-sbom
          path: julia-sbom.txt
          retention-days: 90
