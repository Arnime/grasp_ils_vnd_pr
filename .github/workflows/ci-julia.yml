name: CI Julia

on:
  push:
    branches: [ main ]
    paths:
      - "julia/**"
      - "!julia/**/*.md"
      - "!julia/LICENSE"
      - ".github/workflows/ci-julia.yml"
      - "codecov.yml"
  pull_request:
    paths:
      - "julia/**"
      - "!julia/**/*.md"
      - "!julia/LICENSE"
      - ".github/workflows/ci-julia.yml"
      - "codecov.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions: read-all

jobs:
  test:
    runs-on: ${{ matrix.os }}
    permissions:
      actions: write # required by julia-actions/cache delete-old-caches
      checks: read
      contents: read
      deployments: read
      issues: read
      packages: read
      pull-requests: read
      repository-projects: read
      security-events: read
      statuses: read
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        julia-version: [ "1.9", "1.10", "1.11", "1.12" ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: julia-actions/setup-julia@f6f565d9f7cf12f53dc8045742460d6260ad3b39 # v3.0.1
        with:
          version: ${{ matrix.julia-version }}

      - uses: julia-actions/cache@d10a6fd8f31b12404a54613ebad242900567f2b9 # v2

      - name: Install dependencies
        run: |
          julia --project=julia -e '
            using Pkg
            Pkg.Registry.update()
            rm(joinpath("julia", "Manifest.toml"); force=true)
            Pkg.instantiate()
          '

      - name: Run tests
        run: julia --project=julia -e 'using Pkg; Pkg.test()'

      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.julia-version == '1.12'
        run: julia --project=julia -e 'using Pkg; Pkg.test(; coverage=true)'

      - name: Process coverage
        if: matrix.os == 'ubuntu-latest' && matrix.julia-version == '1.12'
        run: |
          julia -e '
            using Pkg
            Pkg.add("CoverageTools")
            using CoverageTools
            coverage = process_folder("julia/src")
            LCOV.writefile("julia-lcov.info", coverage)
          '

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.julia-version == '1.12'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          files: julia-lcov.info
          flags: julia
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
