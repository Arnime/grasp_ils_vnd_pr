name: Docs

on:
    push:
        branches: [ main ]
    workflow_dispatch:

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions: read-all

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            deployments: write
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
              with:
                  python-version: "3.12"
            - name: Install
              run: |
                  pip install --require-hashes -r requirements/docs.txt
                  sh .github/scripts/install-package.sh
            - name: Build
              run: mkdocs build --strict
            - name: Deploy to Cloudflare Pages
              uses: cloudflare/wrangler-action@da0e0235f5e69e76fe4e79a4e1cda6b209a77804 # v3.14.0
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  command: pages deploy site --project-name=givp
