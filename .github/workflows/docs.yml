name: Docs

on:
    push:
        branches: [ main ]
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build-deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
            - name: Install
              run: |
                  python -m pip install --upgrade pip
                  pip install -e .[docs]
            - name: Build & deploy
              run: mkdocs gh-deploy --force --clean
