name: Audit

on:
    push:
        branches: [ main ]
        paths:
            - "python/requirements/**"
            - "pyproject.toml"
            - ".github/workflows/audit.yml"
    pull_request:
    schedule:
        - cron: "13 5 * * 1"

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
    contents: read

jobs:
    pip-audit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
              with:
                  python-version: "3.12"
            - name: Install
              run: |
                  pip install --require-hashes -r python/requirements/audit.txt
                  sh .github/scripts/install-package.sh
            - name: Audit
              run: |
                  pip freeze --exclude-editable > /tmp/audit-reqs.txt
                  pip-audit -r /tmp/audit-reqs.txt
