name: Audit

on:
    push:
        branches: [ main ]
    pull_request:
    schedule:
        - cron: "13 5 * * 1"

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
    contents: read

jobs:
    pip-audit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
            - name: Install
              run: |
                  python -m pip install --upgrade pip
                  pip install -e .[dev]
                  pip install pip-audit>=2.7
            - name: Audit
              run: pip-audit --strict
