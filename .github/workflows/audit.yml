name: Audit

on:
    push:
        branches: [ main ]
    pull_request:
    schedule:
        - cron: "13 5 * * 1"

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
    contents: read

jobs:
    pip-audit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
              with:
                  python-version: "3.12"
            - name: Install
              run: |
                  pip install -e .[dev]
                  pip install "pip-audit>=2.7"
            - name: Audit
              run: |
                  pip freeze --exclude-editable > /tmp/audit-reqs.txt
                  pip-audit -r /tmp/audit-reqs.txt
