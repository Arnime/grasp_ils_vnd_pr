name: Security Checks

on:
    push:
        branches: [ main ]
    pull_request:
    schedule:
        - cron: "0 3 * * *"

permissions: read-all

jobs:
    pip-audit:
        name: pip-audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
              with:
                  python-version: "3.12"
            - name: Install requirements (if present)
              run: |
                  python -m pip install --upgrade pip
                  if [ -f requirements/ci.txt ]; then python -m pip install -r requirements/ci.txt; fi
            - name: Run pip-audit
              run: |
                  python -m pip install pip-audit
                  if [ -f requirements/ci.txt ]; then pip-audit -r requirements/ci.txt; else pip-audit; fi

    bandit:
        name: Bandit scan
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
              with:
                  python-version: "3.12"
            - name: Install Bandit
              run: python -m pip install bandit
            - name: Run Bandit
              run: bandit -r src -lll

    semgrep:
        name: Semgrep scan
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - name: Run Semgrep
              uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
              with:
                  config: "p/ci"
