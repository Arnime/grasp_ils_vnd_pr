name: Security Checks

on:
    push:
        branches: [ main ]
        paths:
            - "python/**"
            - "pyproject.toml"
            - ".github/workflows/security.yml"
    pull_request:
        paths:
            - "python/**"
            - "pyproject.toml"
            - ".github/workflows/security.yml"
    schedule:
        - cron: "0 3 * * *"

permissions: read-all

jobs:
    pip-audit:
        name: pip-audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
              with:
                  python-version: "3.12"
            - name: Install
              run: |
                  pip install --require-hashes -r python/requirements/audit.txt
                  sh .github/scripts/install-package.sh
            - name: Run pip-audit
              run: |
                  pip freeze --exclude-editable > /tmp/audit-reqs.txt
                  pip-audit -r /tmp/audit-reqs.txt

    bandit:
        name: Bandit scan
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
              with:
                  python-version: "3.12"
            - name: Install Bandit
              run: pip install --require-hashes -r python/requirements/security.txt
            - name: Run Bandit
              run: bandit -r python/src -lll

    semgrep:
        name: Semgrep scan
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - name: Run Semgrep
              uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
              with:
                  config: "p/ci"
