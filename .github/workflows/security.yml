name: Security Checks

on:
    push:
        branches: [ main ]
    pull_request:
    schedule:
        - cron: "0 3 * * *"

permissions: read-all

jobs:
    pip-audit:
        name: pip-audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
            - name: Install requirements (if present)
              run: |
                  python -m pip install --upgrade pip
                  if [ -f requirements/ci.txt ]; then python -m pip install -r requirements/ci.txt; fi
            - name: Run pip-audit
              run: |
                  python -m pip install pip-audit
                  if [ -f requirements/ci.txt ]; then pip-audit -r requirements/ci.txt; else pip-audit; fi

    bandit:
        name: Bandit scan
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
            - name: Install Bandit
              run: python -m pip install bandit
            - name: Run Bandit
              run: bandit -r src -lll

    semgrep:
        name: Semgrep scan
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Run Semgrep
              uses: returntocorp/semgrep-action@v1
              with:
                  config: "p/ci"
