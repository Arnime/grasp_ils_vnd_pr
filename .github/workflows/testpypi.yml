name: TestPyPI

on:
    push:
        branches: [ main ]
    workflow_dispatch:

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
    contents: read
    id-token: write

jobs:
    publish-test:
        runs-on: ubuntu-latest
        environment:
            name: testpypi
            url: https://test.pypi.org/p/givp
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  fetch-depth: 0
            - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
              with:
                  python-version: "3.12"
            - name: Build
              run: |
                  pip install --require-hashes -r python/requirements/release-tools.txt
                  # Append a .devN suffix derived from commit count so each push uploads
                  # a unique version (TestPyPI rejects duplicates).
                  DEV_SUFFIX=".dev$(git rev-list --count HEAD)"
                  python -c "import re,pathlib; p=pathlib.Path('pyproject.toml'); s=p.read_text(); p.write_text(re.sub(r'(version\\s*=\\s*\")([^\"]+)(\")', r'\\g<1>\\g<2>${DEV_SUFFIX}\\g<3>', s, count=1))"
                  python -m build
            - name: Smoke install
              run: |
                  sh .github/scripts/smoke-install.sh
                  /tmp/smoke/bin/python -c "import givp; print(givp.__version__)"
            - name: Publish to TestPyPI
              uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
              with:
                  repository-url: https://test.pypi.org/legacy/
                  skip-existing: true
