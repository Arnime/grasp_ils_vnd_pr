name: TestPyPI

on:
    push:
        branches: [ main ]
    workflow_dispatch:

permissions:
    contents: read
    id-token: write

jobs:
    publish-test:
        runs-on: ubuntu-latest
        environment:
          name: testpypi
          url: https://test.pypi.org/p/givp
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
            - name: Build
              run: |
                  python -m pip install --upgrade build
                  # Append a .devN suffix derived from commit count so each push uploads
                  # a unique version (TestPyPI rejects duplicates).
                  DEV_SUFFIX=".dev$(git rev-list --count HEAD)"
                  python -c "import re,pathlib; p=pathlib.Path('pyproject.toml'); s=p.read_text(); p.write_text(re.sub(r'(version\\s*=\\s*\")([^\"]+)(\")', r'\\g<1>\\g<2>${DEV_SUFFIX}\\g<3>', s, count=1))"
                  python -m build
            - name: Smoke install
              run: |
                  python -m venv /tmp/smoke
                  /tmp/smoke/bin/pip install dist/*.whl
                  /tmp/smoke/bin/python -c "import givp; print(givp.__version__)"
            - name: Publish to TestPyPI
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  repository-url: https://test.pypi.org/legacy/
                  skip-existing: true
