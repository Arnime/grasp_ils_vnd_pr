name: Backfill Provenance

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions: read-all

# ---------------------------------------------------------------------------
# For each legacy tag: checks out main (current build tooling + lock files),
# overlays only the source from the tag, builds, signs with Sigstore, attests
# provenance via actions/attest-build-provenance, and attaches the sigstore
# files to the existing GitHub release.
# ---------------------------------------------------------------------------

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        tag: [ v0.1.2, v0.2.0, v0.2.2, v0.3.0, v0.4.0, v0.4.1 ]
    steps:
      - name: Check out main (build tooling)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          persist-credentials: false

      - name: Overlay source from ${{ matrix.tag }}
        run: |
          git fetch --tags --no-recurse-submodules origin ${{ matrix.tag }}
          git checkout ${{ matrix.tag }} -- src pyproject.toml

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Build
        run: |
          pip install --require-hashes -r requirements/release-tools.txt
          python -m build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*

      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl

      - name: Rename sigstore bundles for Scorecard compatibility
        run: for f in dist/*.sigstore.json; do mv "$f" "${f%.json}"; done

      - name: Attach sigstore files to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ matrix.tag }}
          files: dist/*.sigstore
