name: Backfill Provenance

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to backfill (e.g. v1.2.3)"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions: read-all

# ---------------------------------------------------------------------------
# "Break-glass" workflow: rebuilds a release from its tagged source,
# re-signs with Sigstore, attaches .sigstore files to the existing GitHub
# release, and generates SLSA provenance (multiple.intoto.jsonl).
#
# Use this when the release.yml provenance job failed or the release was
# published before SLSA provenance was added to the pipeline.
#
# Usage: Actions -> Backfill Provenance -> Run workflow -> enter tag name
# ---------------------------------------------------------------------------

jobs:

  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          persist-credentials: false

      - name: Overlay source from ${{ inputs.tag_name }}
        env:
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          git fetch --tags --no-recurse-submodules origin "$TAG_NAME"
          git checkout "$TAG_NAME" -- python/src pyproject.toml

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Build
        run: |
          pip install --require-hashes -r python/requirements/release-tools.txt
          python -m build

      - name: Generate artifact hashes
        id: hash
        run: cd dist && echo "hashes=$(sha256sum * | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*

      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl

      - name: Rename sigstore bundles for Scorecard compatibility
        run: for f in dist/*.sigstore.json; do mv "$f" "${f%.json}"; done

      - name: Attach sigstore files to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ inputs.tag_name }}
          files: dist/*.sigstore

      - name: Upload dist for SLSA
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-backfill
          path: dist/
          retention-days: 1

  provenance:
    needs: [ build ]
    permissions:
      actions: read
      id-token: write
      contents: write
    # slsa-framework/slsa-github-generator is exempt from hash-pinning per Scorecard policy
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: true
      upload-tag-name: ${{ inputs.tag_name }}
