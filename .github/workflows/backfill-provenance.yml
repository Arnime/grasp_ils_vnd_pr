name: Backfill Provenance

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions: read-all

# ---------------------------------------------------------------------------
# For each legacy tag: checks out main (current build tooling + lock files),
# overlays only src/ and pyproject.toml from the tag, builds, signs with
# Sigstore, attaches .sigstore files to the existing release, and generates
# SLSA provenance via slsa-github-generator (uploaded as multiple.intoto.jsonl).
#
# Note: slsa-github-generator must be called as a reusable workflow (uses:)
# at the job level — matrix strategy is incompatible with this constraint,
# so jobs are defined explicitly per tag.
# ---------------------------------------------------------------------------

jobs:

  # ── v0.2.0 ────────────────────────────────────────────────────────────────

  build-v020:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          persist-credentials: false
      - name: Overlay source from v0.2.0
        run: |
          git fetch --tags --no-recurse-submodules origin v0.2.0
          git checkout v0.2.0 -- src pyproject.toml
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          pip install --require-hashes -r requirements/release-tools.txt
          python -m build
      - name: Generate artifact hashes
        id: hash
        run: cd dist && echo "hashes=$(sha256sum * | base64 -w0)" >> "$GITHUB_OUTPUT"
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*
      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl
      - name: Rename sigstore bundles for Scorecard compatibility
        run: for f in dist/*.sigstore.json; do mv "$f" "${f%.json}"; done
      - name: Attach sigstore files to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v0.2.0
          files: dist/*.sigstore
      - name: Upload dist for SLSA
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-v020
          path: dist/
          retention-days: 1

  provenance-v020:
    needs: [build-v020]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: "${{ needs.build-v020.outputs.hashes }}"
      upload-assets: true
      upload-tag-name: v0.2.0

