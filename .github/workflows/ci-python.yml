name: CI Python

on:
  push:
    branches: [ main ]
    paths:
      - "python/**"
      - "pyproject.toml"
      - ".github/workflows/ci-python.yml"
      - "codecov.yml"
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions: read-all

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]
        include:
          - python-version: "3.10"
            lockfile: python/requirements/ci-py310.txt
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          pip install --require-hashes -r ${{ matrix.lockfile || 'python/requirements/ci.txt' }}
          sh .github/scripts/install-package.sh
      - name: Lint
        run: ruff check python/src python/tests
      - name: Type-check
        run: mypy
      - name: Test
        run: pytest --cov=givp --cov-report=xml
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          files: coverage.xml
          flags: python
          token: ${{ secrets.CODECOV_TOKEN }}
          version: v11.2.8
          fail_ci_if_error: false

  test-pre-release:
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.15"
          allow-prereleases: true
      - name: Install
        run: |
          pip install --require-hashes -r python/requirements/ci.txt
          sh .github/scripts/install-package.sh
      - name: Lint
        run: ruff check python/src python/tests
      - name: Type-check
        run: mypy
      - name: Test
        run: pytest --cov=givp --cov-report=xml

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install --require-hashes -r python/requirements/docs.txt
          sh .github/scripts/install-package.sh
      - name: Build docs (strict)
        run: mkdocs build --strict
