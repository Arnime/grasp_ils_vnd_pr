name: CI Python

on:
  push:
    branches: [ main ]
    paths:
      - "python/**"
      - "pyproject.toml"
      - ".github/workflows/ci-python.yml"
      - "codecov.yml"
  pull_request:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:
    inputs:
      run_mutation:
        description: "Run mutation job (manual only)"
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions: read-all

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.pick.outputs.versions }}
      source_changed: ${{ steps.pick.outputs.source_changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: pick
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            if git diff --name-only "$PR_BASE" HEAD -- python/src python/tests | grep -q .; then
              echo 'versions=["3.10","3.11","3.12","3.13","3.14"]' >> "$GITHUB_OUTPUT"
              echo 'source_changed=true' >> "$GITHUB_OUTPUT"
            else
              echo 'versions=["3.13"]' >> "$GITHUB_OUTPUT"
              echo 'source_changed=false' >> "$GITHUB_OUTPUT"
            fi
          else
            echo 'versions=["3.10","3.11","3.12","3.13","3.14"]' >> "$GITHUB_OUTPUT"
            echo 'source_changed=true' >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        python-version: ${{ fromJson(needs.setup.outputs.versions) }}
        include:
          - python-version: "3.10"
            lockfile: python/requirements/ci-py310.txt
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          pip install --require-hashes -r ${{ matrix.lockfile || 'python/requirements/ci.txt' }}
          sh .github/scripts/install-package.sh
      - name: Lint
        run: ruff check python/src python/tests
      - name: Type-check
        run: mypy
      - name: Test
        run: pytest

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install
        run: |
          pip install --require-hashes -r python/requirements/ci.txt
          sh .github/scripts/install-package.sh
      - name: Test with coverage
        run: pytest --cov=givp --cov-report=xml:coverage-python.xml --cov-fail-under=95
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          files: coverage-python.xml
          flags: python
          token: ${{ secrets.CODECOV_TOKEN }}
          version: v11.2.8
          fail_ci_if_error: true

  property-tests:
    name: Property-based tests (Hypothesis max_examples=50)
    needs: setup
    runs-on: ubuntu-latest
    # Run on source changes only; property tests are slow (50 examples × 5 tests)
    if: needs.setup.outputs.source_changed == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install
        run: |
          pip install --require-hashes -r python/requirements/ci.txt
          sh .github/scripts/install-package.sh
      - name: Run property tests
        # Run only test_properties.py with a generous timeout; --no-cov keeps it fast.
        # The Hypothesis database is ephemeral in CI; this is intentional.
        run: |
          pytest python/tests/test_properties.py -v \
            --no-cov \
            --override-ini="addopts=" \
            -p no:randomly

  benchmark-smoke:
    name: Benchmark smoke tests
    runs-on: ubuntu-latest
    # Informational job: does not block merges, but surfaces regressions
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install (with benchmark extras)
        run: |
          pip install --require-hashes -r python/requirements/ci.txt
          pip install --require-hashes -r python/requirements/benchmarks.txt
          sh .github/scripts/install-package.sh
      - name: Benchmark smoke tests
        run: pytest -m slow python/tests/test_benchmark_scripts.py -v
          --override-ini="addopts="

  algorithm-quality-gate:
    name: Algorithm quality gate (convergence assertions)
    needs: setup
    runs-on: ubuntu-latest
    # BLOCKING: this job must pass before merging. It verifies that GIVP
    # actually converges on standard benchmark functions, not merely that it
    # runs without errors. Thresholds are statistical (median over N_SEEDS
    # runs) and calibrated at the 95th-percentile worst-case for the default
    # GIVP configuration. A failure here indicates an algorithmic regression.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install
        run: |
          pip install --require-hashes -r python/requirements/ci.txt
          sh .github/scripts/install-package.sh
      - name: Run convergence quality gate
        run: |
          pytest -m quality_gate python/tests/test_algorithm_quality.py \
            -v \
            --no-cov \
            --override-ini="addopts=" \
            --tb=short

  benchmark-regression:
    name: Benchmark regression (informational)
    needs: setup
    runs-on: ubuntu-latest
    # Informational: surfaces performance regressions but does not block merges
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install
        run: |
          pip install --require-hashes -r python/requirements/ci.txt
          sh .github/scripts/install-package.sh
      - name: Run performance benchmarks
        run: |
          mkdir -p python/benchmarks/.results
          pytest python/benchmarks/test_benchmarks.py \
            --benchmark-only \
            --benchmark-autosave \
            --benchmark-storage=python/benchmarks/.results \
            --override-ini="addopts="
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: benchmark-results-${{ github.sha }}
          path: python/benchmarks/.results/
          retention-days: 90

  mutation:
    name: Mutation testing fast gate (≥ 65 % kill rate)
    needs: setup
    runs-on: ubuntu-latest
    # Run on weekly schedule or manually via workflow_dispatch input.
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch'
      && github.event.inputs.run_mutation == 'true')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install --require-hashes -r python/requirements/ci.txt
          sh .github/scripts/install-package.sh
          pip install mutmut==2.4.4
      - name: Remove broken symlinks (mutmut workaround)
        run: |
          BROKEN_LINKS=$(find . -xtype l | wc -l)
          if [ "$BROKEN_LINKS" -gt 0 ]; then
            echo "Removing ${BROKEN_LINKS} broken symlink(s) before mutmut"
            find . -xtype l -print -delete
          else
            echo "No broken symlinks found"
          fi
      - name: Run mutation tests (fast smoke scope)
        run: |
          # Keep CI mutation tests very fast: smoke scope only.
          MUTATE_PATHS="python/src/givp/api.py"
          TEST_RUNNER="python -m pytest python/tests/test_api.py -q --no-cov -x"
          mutmut run \
            --paths-to-mutate "$MUTATE_PATHS" \
            --runner "$TEST_RUNNER" \
            --max-children 8 \
            --no-progress
      - name: Enforce kill-rate gate (≥ 65 %)
        # mutmut exits 0 only when all mutants are killed; we enforce a minimum
        # kill rate so that surviving a few edge-case mutants does not block CI,
        # but a large regression in test quality does.
        run: |
          KILLED=$(mutmut results 2>/dev/null | grep -cE "^[0-9]+ - [^-]+ - killed" || true)
          TOTAL=$(mutmut results 2>/dev/null | grep -cE "^[0-9]+ - [^-]+ - (killed|survived|timeout)" || true)
          echo "Killed: ${KILLED}  Total: ${TOTAL}"
          if [ "${TOTAL}" -eq 0 ]; then
            echo "No mutants generated — check mutmut configuration."
            exit 1
          fi
          # Integer arithmetic: kill_rate = KILLED * 100 / TOTAL
          KILL_RATE=$(( KILLED * 100 / TOTAL ))
          echo "Kill rate: ${KILL_RATE}%"
          if [ "${KILL_RATE}" -lt 65 ]; then
            echo "ERROR: kill rate ${KILL_RATE}% is below the 65% gate."
            exit 1
          fi
          echo "Kill rate gate passed: ${KILL_RATE}%"

  test-pre-release:
    needs: setup
    if: needs.setup.outputs.source_changed == 'true'
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.15"
          allow-prereleases: true
      - name: Install
        run: |
          pip install --require-hashes -r python/requirements/ci.txt
          sh .github/scripts/install-package.sh
      - name: Lint
        run: ruff check python/src python/tests
      - name: Type-check
        run: mypy
      - name: Test
        run: pytest

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install --require-hashes -r python/requirements/docs.txt
          sh .github/scripts/install-package.sh
      - name: Build docs (strict)
        run: mkdocs build --strict
