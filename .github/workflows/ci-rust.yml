name: CI Rust

on:
  push:
    branches: [ main ]
    paths:
      - "rust/**"
      - "!rust/**/*.md"
      - "!rust/LICENSE"
      - ".github/workflows/ci-rust.yml"
      - "codecov.yml"
  pull_request:
    paths:
      - "rust/**"
      - "!rust/**/*.md"
      - "!rust/LICENSE"
      - ".github/workflows/ci-rust.yml"
      - "codecov.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always

permissions: read-all

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      toolchains: ${{ steps.pick.outputs.toolchains }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: pick
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            if git diff --name-only "$PR_BASE" HEAD -- rust/src rust/tests rust/benches | grep -q .; then
              echo 'toolchains=["stable","1.85","beta"]' >> "$GITHUB_OUTPUT"
            else
              echo 'toolchains=["stable"]' >> "$GITHUB_OUTPUT"
            fi
          else
            echo 'toolchains=["stable","1.85","beta"]' >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: setup
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.rust == 'beta' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        rust: ${{ fromJson(needs.setup.outputs.toolchains) }}
        exclude:
          - rust: beta
            os: windows-latest
          - rust: beta
            os: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ matrix.rust }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: "rust -> target"

      - name: Build
        working-directory: rust
        run: cargo build --verbose

      - name: Run tests
        working-directory: rust
        run: cargo test --verbose

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: clippy

      - name: Clippy
        working-directory: rust
        run: cargo clippy --all-targets --all-features -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt

      - name: rustfmt
        working-directory: rust
        run: cargo fmt --all -- --check

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: "rust -> target"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@481c34c1cf3a84c68b5e46f4eccfc82af798415a # v2.75.23
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage
        working-directory: rust
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info

      - name: Check coverage gate (≥90%)
        working-directory: rust
        run: |
          hit=$(grep '^LH:' lcov.info | awk -F: '{s+=$2} END {print s+0}')
          total=$(grep '^LF:' lcov.info | awk -F: '{s+=$2} END {print s+0}')
          if [ "$total" -eq 0 ]; then
            echo "::error::No coverage data found in lcov.info"
            exit 1
          fi
          pct=$(awk "BEGIN {printf \"%.1f\", $hit / $total * 100}")
          echo "Rust coverage: ${pct}%  ($hit / $total lines)"
          awk "BEGIN { if ($hit / $total * 100 < 90.0) { print \"::error::Coverage below 90% threshold (got ${pct}%)\"; exit 1 } }"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: rust/lcov.info
          flags: rust
          fail_ci_if_error: true

  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: "rust -> target"

      - name: Run benchmarks (smoke test)
        working-directory: rust
        run: cargo bench -- --test
