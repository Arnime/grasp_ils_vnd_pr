name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.2)"
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions: read-all

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/givp
    permissions:
      id-token: write
      contents: write
      attestations: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}',
            inputs.tag) || github.ref }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          pip install --require-hashes -r requirements/release-tools.txt
          python -m build
      - name: Generate artifact hashes
        id: hash
        run: |
          cd dist && echo "hashes=$(sha256sum * | base64 -w0)" >> "$GITHUB_OUTPUT"
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*
      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl
      - name: Rename sigstore bundles for Scorecard compatibility
        run: for f in dist/*.sigstore.json; do mv "$f" "${f%.json}"; done
      - name: Generate SBOM (CycloneDX)
        run: cyclonedx-py environment --of JSON -o sbom.cdx.json
      - name: Attach artifacts to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            sbom.cdx.json
            dist/*
      - name: Move sigstore files out of dist
        run: mv dist/*.sigstore .
      - name: Publish to PyPI (trusted publisher)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          skip-existing: true
          packages-dir: dist
          attestations: true

  provenance:
    needs: [ build-and-publish ]
    permissions:
      actions: read
      id-token: write
      contents: write
    # slsa-framework/slsa-github-generator is exempt from hash-pinning per Scorecard policy
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: "${{ needs.build-and-publish.outputs.hashes }}"
      upload-assets: true
