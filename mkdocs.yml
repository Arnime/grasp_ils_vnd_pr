# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json
site_name: givp
site_description: GRASP-ILS-VND with Path Relinking — direction-agnostic metaheuristic optimizer.
repo_url: https://github.com/Arnime/grasp_ils_vnd_pr
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [ python/src ]
          options:
            show_source: false
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            docstring_style: google

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: "pymdownx.superfences.fence_code_format"
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Julia: julia.md
  - CLI Reference: cli.md
  - Algorithm: algorithm.md
  - Examples: examples.md
  - Comparison: comparison.md
  - Profiling: profiling.md
  - Roadmap: roadmap.md
  - Security requirements: security-requirements.md
  - API Reference:
      - givp: api/grasp_ils_vnd_pr.md
      - GIVPOptimizer: api/optimizer.md
      - Configuration: api/config.md
      - Result: api/result.md
      - Exceptions: api/exceptions.md
