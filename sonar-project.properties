sonar.projectKey=Arnime_grasp_ils_vnd_pr
sonar.organization=arnime
sonar.projectName=givp
sonar.sources=python/src,julia/src,rust/src,cpp/include,r/R
sonar.tests=python/tests,julia/test,rust/tests,cpp/tests,r/tests/testthat

# Keep analysis focused on production code and unit tests.
sonar.exclusions=**/build/**,**/target/**,**/.venv/**,**/.julia-env/**,**/Notebooks/**,**/*.ipynb,**/docs/**,**/site/**
sonar.test.exclusions=**/fuzz/**,**/benchmarks/**,**/examples/**

# Optional coverage imports (scanner skips missing files).
sonar.python.version=3.13
sonar.python.coverage.reportPaths=coverage-python.xml
sonar.rust.lcov.reportPaths=rust/lcov.info,lcov.info
sonar.generic.coverage.reportPaths=julia-lcov.info

# Header-only C++ analysis via compilation database generated in CI.
sonar.cfamily.compile-commands=build-sonar/compile_commands.json

# Disable SCM timestamp probing — avoids "Operation not permitted" errors
# when the workspace is mounted from a Windows NTFS volume into the container.
sonar.scm.disabled=true
